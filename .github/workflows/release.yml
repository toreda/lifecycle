name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          if [ "${PKG_VERSION}" != "${{ steps.version.outputs.version }}" ]; then
            echo "::error::tag ${{ steps.version.outputs.tag }} does not match package.json version ${PKG_VERSION}"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Extract release notes from CHANGELOG.md
        run: |
          VERSION='${{ steps.version.outputs.version }}'
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::warning::No CHANGELOG section found for ${VERSION} — release notes will be empty."
            echo "Release ${VERSION}" > release-notes.md
          fi
          echo "Release notes preview:"
          echo "----------------------"
          cat release-notes.md
          echo "----------------------"

      - name: Package release zip
        run: |
          mkdir -p artifacts
          zip -r "artifacts/lifecycle-${{ steps.version.outputs.version }}.zip" dist

      - name: Show artifact list
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          files: |
            artifacts/lifecycle-${{ steps.version.outputs.version }}.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
